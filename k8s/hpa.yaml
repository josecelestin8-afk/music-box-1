apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: musicbox-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: musicbox-deployment

  minReplicas: 1
  maxReplicas: 10

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60   # ✅ FIX IMPORTANT (était 10%)

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60

    scaleDown:
      stabilizationWindowSeconds: 60   # ✅ évite oscillation
      selectPolicy: Max
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60